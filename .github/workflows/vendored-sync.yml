name: Vendored spec sync

# Finding-1 drift guard: schemas/ here are vendored copies of normative artifacts
# whose source of truth is the openwop/openwop spec corpus. This fails if a copy
# drifts. Runs weekly (catches upstream changes that didn't touch this repo) and
# on PRs that touch the vendored paths.

on:
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - 'schemas/**'
      - 'api/**'
      - 'scripts/check-vendored-sync.mjs'

jobs:
  vendored-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: node scripts/check-vendored-sync.mjs
