name: registry-publish

on:
  pull_request:
    paths:
      - 'registry/**'
      - '.github/workflows/registry-publish.yml'
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - '.github/workflows/registry-publish.yml'
  # Manual redeploy without a content change. Useful when the deploy
  # tooling itself was updated and you want to validate end-to-end
  # without forcing a registry-tree commit.
  workflow_dispatch:

jobs:
  validate:
    name: Validate registry content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate registry JSON files parse
        run: |
          find registry -name '*.json' -print0 | xargs -0 -I {} sh -c '
            python3 -c "import json,sys; json.load(open(\"{}\"))" || {
              echo "::error file={}::Invalid JSON"
              exit 1
            }
          '

      - name: Validate version manifests against registry-version-manifest schema
        run: |
          # Stage 2 PR 1 (2026-05-12): replaces the v1.2-pending TODO.
          # Every registry/v1/packs/<name>/-/<version>.json MUST conform to
          # schemas/registry-version-manifest.schema.json. The new schema
          # extends the bare pack-manifest schema with the registry-side
          # augmentations (integrity, publishedAt, tarballUrl, signatureUrl,
          # deprecated, yanked) that build-index.mjs writes.
          #
          # Catches: missing required fields, wrong types, bad SemVer,
          # invalid integrity-hash format, registry-relative URL drift,
          # malformed signing block.
          npm install -g ajv-cli@5 ajv-formats@3
          set -e
          found=0
          fails=0
          for manifest in $(find registry/v1/packs -path '*/-/*.json' -not -name 'index.json' -not -name '*.sbom.json' 2>/dev/null); do
            found=$((found + 1))
            if ! ajv validate --spec=draft2020 \
                              -s schemas/registry-version-manifest.schema.json \
                              -d "$manifest" \
                              --strict=false \
                              -c ajv-formats; then
              echo "::error file=$manifest::version manifest fails schema validation"
              fails=$((fails + 1))
            fi
          done
          echo "checked $found manifest(s), $fails failed"
          if [ "$fails" -gt 0 ]; then
            exit 1
          fi
          if [ "$found" -eq 0 ]; then
            echo "::warning::no version manifests found under registry/v1/packs"
          fi

      - name: Check index files are up to date
        run: |
          node registry/scripts/build-index.mjs --check

      - name: Verify tarball integrity hashes
        run: |
          # For each .tgz in registry/, recompute sha256 and compare to
          # the manifest's `integrity` field. Submissions that bypass
          # build-index.mjs fail here.
          python3 - <<'PY'
          import hashlib, base64, json, os, sys
          from pathlib import Path
          root = Path('registry/v1/packs')
          errors = []
          if not root.exists():
              print('no packs directory; nothing to verify')
              sys.exit(0)
          for pack_dir in root.iterdir():
              versions_dir = pack_dir / '-'
              if not versions_dir.is_dir():
                  continue
              for tgz in versions_dir.glob('*.tgz'):
                  version = tgz.stem
                  manifest_path = versions_dir / f'{version}.json'
                  if not manifest_path.exists():
                      errors.append(f'{tgz}: no matching manifest at {manifest_path}')
                      continue
                  manifest = json.load(open(manifest_path))
                  expected = manifest.get('integrity', '')
                  digest = hashlib.sha256(tgz.read_bytes()).digest()
                  actual = 'sha256-' + base64.b64encode(digest).decode('ascii')
                  if expected != actual:
                      errors.append(
                          f'{tgz}: integrity mismatch (manifest says {expected!r}, file is {actual!r})'
                      )
          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          print('all integrity hashes verified')
          PY

      - name: Verify Ed25519 signatures cryptographically
        run: |
          # Stage 2 PR 2 (2026-05-12): replaces the prior presence-only sig
          # check with full cryptographic verification per the enterprise-
          # architecture review (CRITICAL finding #1).
          #
          # The verifier handles both signing conventions in the wild:
          #   - `signing.method: ed25519` — sig over whole gzipped tarball
          #     bytes (original packs per registry/README.md)
          #   - `signing.method: manual` — sig over pack.json bytes inside
          #     the tarball (newer packs from build-pack-tarball.mjs)
          #
          # Also enforces namespace authorization: the keyId on each pack
          # MUST be authorized for that pack's namespace per the
          # `signingKeys[].permittedNamespaces` allow-list in
          # .well-known/openwop-registry.json. A vendor key signing a
          # core.* pack would fail here.
          node registry/scripts/verify-signatures.mjs

      - name: Run structural conformance check on every pack
        run: |
          # Stage 2 PR 3 (2026-05-12): closes CRITICAL finding #3 from
          # the enterprise-architecture review. Authoring-level conformance
          # gate that catches the most common pack-publishing mistakes
          # before merge:
          #   - tarball vs. version-manifest identity drift
          #     (different name/version inside vs. outside the tarball)
          #   - schema refs pointing at missing files in the tarball
          #   - schema refs with path traversal (`..`)
          #   - schema files that aren't valid JSON
          #   - duplicate typeIds within a single pack
          #   - peerDependencies with non-string values
          #
          # Pure Node 20 stdlib; no npm install required. Runtime
          # conformance (the pack actually dispatches on a reference host)
          # ships as a per-pack scenario in Stage 5 when each canvas pack
          # is published.
          node registry/scripts/conformance-check.mjs

      - name: Generate + check SBOMs (CycloneDX 1.6)
        run: |
          # Stage 4 PR 2 (2026-05-12): operational maturity per the
          # enterprise-architecture review. Every published pack gets a
          # sibling <version>.sbom.json describing its files, hashes,
          # license, and declared host peerDependencies. The aggregate
          # registry/v1/sbom.json lists every version.
          #
          # CI runs in --check mode: regenerates the SBOMs in-memory and
          # fails if any bytes differ from what's committed. Authors
          # MUST `node registry/scripts/generate-sbom.mjs` after touching
          # a tarball or manifest. Output is deterministic (no
          # timestamps, sorted keys) so re-runs without source changes
          # are no-ops.
          #
          # Consumers (host-side verifier + downstream supply-chain
          # tooling) read the per-version SBOM URL from
          # registry/v1/sbom.json's component[].externalReferences.
          node registry/scripts/generate-sbom.mjs --check

      - name: Validate security advisories against schema
        run: |
          # Stage 4 PR 3 (2026-05-12): operational maturity per the
          # enterprise-architecture review. The registry maintains its
          # own security-advisory feed at registry/security/advisories.json.
          # Schema: schemas/security-advisory.schema.json describes one
          # advisory record; validate per-element via jq-emit + ajv-stdin
          # to surface the offending entry on failure.
          set -e
          if [ -f registry/security/advisories.json ]; then
            count=0
            tmpdir=$(mktemp -d)
            jq -c '.advisories[]?' registry/security/advisories.json | while IFS= read -r line; do
              count=$((count+1))
              advisory_file="$tmpdir/advisory-$count.json"
              echo "$line" > "$advisory_file"
              if ! ajv validate --spec=draft2020 \
                              -s schemas/security-advisory.schema.json \
                              --strict=false \
                              -c ajv-formats \
                              -d "$advisory_file"; then
                echo "::error file=registry/security/advisories.json::advisory #$count fails schema"
                exit 1
              fi
            done
            echo "advisories checked"
          else
            echo "::warning::no registry/security/advisories.json — skipping advisory schema check"
          fi

      - name: Cross-check advisories against published versions
        run: |
          # Stage 4 PR 3 (2026-05-12): registry/scripts/check-advisories.mjs
          # iterates every advisory's affected[] rows, expands SemVer
          # ranges against published versions, and fails CI if any
          # non-yanked version matches an active advisory. Forces the
          # yank-with-advisory invariant the maintainer process depends on.
          node registry/scripts/check-advisories.mjs

  deploy:
    name: Deploy to packs.openwop.dev
    needs: validate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    environment:
      name: packs-openwop-dev
      url: https://packs.openwop.dev
    # Workload Identity Federation requires the OIDC token at job level.
    # `contents: read` is the default; explicit here for clarity.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Authenticate to Google Cloud via Workload Identity Federation —
      # NO downloadable service-account key. The openwop-dev project
      # disables SA-key creation (org policy
      # `iam.disableServiceAccountKeyCreation`), so the legacy
      # `FIREBASE_SERVICE_ACCOUNT` JSON-secret approach can't be used.
      # The WIF provider trusts only the openwop org (attribute condition
      # `assertion.repository_owner=="openwop"`), and the bound SA can
      # only be impersonated by workflows running in `openwop/openwop`
      # (principalSet membership). See `registry/README.md` §"Operator
      # setup" for the one-time provisioning steps.
      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/89896419173/locations/global/workloadIdentityPools/github/providers/github-actions'
          service_account: 'github-action-1224821216@openwop-dev.iam.gserviceaccount.com'
          # `access_token` is consumable by firebase-tools via the
          # FIREBASE_TOKEN env var (firebase-tools v12+ accepts a Google
          # OAuth2 access token here, not just a refresh token). The
          # generated federated-credentials file (`credentials_file_path`)
          # is an "external account" format the firebase CLI doesn't
          # recognize directly — using the access-token path avoids that.
          token_format: 'access_token'
          # Hosting deploys need https://www.googleapis.com/auth/firebase
          # + https://www.googleapis.com/auth/cloud-platform; both are
          # included in the default scopes for the auth action.

      - name: Install firebase-tools
        run: npm install -g firebase-tools@latest

      - name: Deploy to Firebase Hosting (packs target)
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          firebase deploy \
            --only hosting:packs \
            --project openwop-dev \
            --non-interactive
